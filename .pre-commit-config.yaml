repos:
  - repo: local
    hooks:
      - id: validate-skills
        name: Validate skills
        entry: scripts/validate-skills.sh
        language: script
        pass_filenames: false
        always_run: true

      - id: markdownlint
        name: Markdownlint
        entry: markdownlint
        language: node
        additional_dependencies: [markdownlint-cli]
        args: [--config, .markdownlint.json]
        files: ^(skills/[^/]+/SKILL\.md|README\.md|CONTRIBUTING\.md|CLAUDE\.md)$
